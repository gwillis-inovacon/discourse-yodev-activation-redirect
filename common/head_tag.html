<script>
  // Plain-script tracer — confirms head_tag is being injected at all on this
  // page type. Will log on every page that uses the theme.
  console.log("[yoDEV-activation-redirect] plain-script tracer: loaded on " + window.location.pathname);
</script>

<script type="text/discourse-plugin" version="0.8">
  // Plugin-API script — has access to theme settings via the `settings` global.
  // Only runs on pages where Discourse's Ember app has initialized.
  console.log("[yoDEV-activation-redirect] plugin-API script: loaded on " + window.location.pathname);

  const HOMEPAGE_URL = settings.homepage_url;
  const REDIRECT_DELAY_MS = parseInt(settings.redirect_delay_ms, 10) || 1500;
  const WATCH_TIMEOUT_MS = parseInt(settings.watch_timeout_ms, 10) || 10000;

  console.log(
    "[yoDEV-activation-redirect] settings: homepage_url=" +
      (HOMEPAGE_URL || "(empty)") +
      " delay=" +
      REDIRECT_DELAY_MS +
      "ms watchTimeout=" +
      WATCH_TIMEOUT_MS +
      "ms"
  );

  function buildTargetUrl() {
    if (!HOMEPAGE_URL) return null;
    return HOMEPAGE_URL.replace(/\/+$/, "") + "/?activated=1";
  }

  function maybeHandleActivation(url) {
    if (!url || url.indexOf("/u/activate-account/") !== 0) return;
    console.log("[yoDEV-activation-redirect] activation page detected: " + url);

    const targetUrl = buildTargetUrl();
    if (!targetUrl) {
      console.warn(
        "[yoDEV-activation-redirect] homepage_url theme setting is empty; not redirecting"
      );
      return;
    }

    let elapsed = 0;
    const pollIntervalMs = 200;
    const intervalId = setInterval(function () {
      elapsed += pollIntervalMs;
      if (elapsed >= WATCH_TIMEOUT_MS) {
        console.warn(
          "[yoDEV-activation-redirect] gave up waiting for Finish button after " +
            WATCH_TIMEOUT_MS +
            "ms"
        );
        clearInterval(intervalId);
        return;
      }
      const btn = document.querySelector(
        "#welcome-button, .activate-account .btn-primary, .activate-account a.btn"
      );
      if (!btn) return;

      console.log(
        "[yoDEV-activation-redirect] Finish button found; scheduling redirect to " +
          targetUrl +
          " in " +
          REDIRECT_DELAY_MS +
          "ms"
      );
      clearInterval(intervalId);
      try {
        btn.setAttribute("href", targetUrl);
      } catch (e) {
        // Non-blocking
      }
      window.setTimeout(function () {
        window.location.href = targetUrl;
      }, REDIRECT_DELAY_MS);
    }, pollIntervalMs);
  }

  // Primary: page-change event for SPA navigation + most initial loads
  api.onPageChange(function (url) {
    maybeHandleActivation(url);
  });

  // Fallback: also run once after script load in case onPageChange skips the
  // initial server-rendered page load
  window.setTimeout(function () {
    maybeHandleActivation(window.location.pathname);
  }, 100);
</script>
