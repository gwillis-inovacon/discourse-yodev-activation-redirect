homepage_url:
  type: string
  default: ""
  description:
    en: "URL of the yoDEV HOMEPAGE app (NOT the Discourse host) where users should be sent after email activation. The homepage is a separate web app that handles signup, plan selection, and post-activation OIDC sign-in. Include protocol and host (e.g., https://homepage-dev.up.railway.app for the Railway dev deploy, or whatever URL your Vite/Next homepage is served from in production). The component appends /?activated=1 so the homepage's App.tsx handler can detect the post-activation arrival and auto-start OIDC."

redirect_delay_ms:
  type: integer
  default: 1500
  min: 0
  max: 10000
  description:
    en: "Milliseconds to wait after the activation success page renders before redirecting to the homepage. Long enough to see the success message, short enough not to feel stalled. 0 means redirect immediately."

watch_timeout_ms:
  type: integer
  default: 10000
  min: 1000
  max: 60000
  description:
    en: "Maximum time to wait for the activation success indicator to appear before giving up (e.g., on failure pages). Default 10s."
