<script>
  (function () {
    // yoDEV Activation Redirect — plain script + CSS-variable settings.
    //
    // <script type="text/discourse-plugin"> doesn't execute on this Discourse
    // setup (verified via missing console output on /latest), so we use a plain
    // <script> for execution and read theme settings from CSS custom properties
    // populated by common.scss via SCSS interpolation.

    console.log(
      "[yoDEV-activation-redirect] script loaded on " + window.location.pathname
    );

    function readCssVarString(name) {
      var v = (
        getComputedStyle(document.documentElement).getPropertyValue(name) || ""
      ).trim();
      // CSS interpolation wraps string values in quotes; strip them
      return v.replace(/^["']|["']$/g, "");
    }

    function readCssVarInt(name, defaultValue) {
      var v = (
        getComputedStyle(document.documentElement).getPropertyValue(name) || ""
      ).trim();
      var n = parseInt(v, 10);
      return isNaN(n) ? defaultValue : n;
    }

    function readSettings() {
      return {
        homepageUrl: readCssVarString("--yodev-activation-redirect-homepage-url"),
        redirectDelayMs: readCssVarInt(
          "--yodev-activation-redirect-delay-ms",
          1500
        ),
        watchTimeoutMs: readCssVarInt(
          "--yodev-activation-redirect-watch-timeout-ms",
          10000
        ),
      };
    }

    function buildTargetUrl(homepageUrl) {
      if (!homepageUrl) return null;
      return homepageUrl.replace(/\/+$/, "") + "/?activated=1";
    }

    function maybeHandleActivation() {
      var path = window.location.pathname || "";
      if (path.indexOf("/u/activate-account/") !== 0) return;

      var s = readSettings();
      console.log(
        "[yoDEV-activation-redirect] activation page detected: " + path,
        s
      );

      var targetUrl = buildTargetUrl(s.homepageUrl);
      if (!targetUrl) {
        console.warn(
          "[yoDEV-activation-redirect] homepage_url empty (CSS var not set); not redirecting"
        );
        return;
      }

      var elapsed = 0;
      var pollIntervalMs = 200;
      var intervalId = setInterval(function () {
        elapsed += pollIntervalMs;
        if (elapsed >= s.watchTimeoutMs) {
          console.warn(
            "[yoDEV-activation-redirect] gave up waiting for Finish button after " +
              s.watchTimeoutMs +
              "ms"
          );
          clearInterval(intervalId);
          return;
        }
        var btn = document.querySelector(
          "#welcome-button, .activate-account .btn-primary, .activate-account a.btn"
        );
        if (!btn) return;

        console.log(
          "[yoDEV-activation-redirect] Finish button found; scheduling redirect to " +
            targetUrl +
            " in " +
            s.redirectDelayMs +
            "ms"
        );
        clearInterval(intervalId);
        try {
          btn.setAttribute("href", targetUrl);
        } catch (e) {
          // Non-blocking
        }
        window.setTimeout(function () {
          window.location.href = targetUrl;
        }, s.redirectDelayMs);
      }, pollIntervalMs);
    }

    // Sanity-log the settings as soon as the stylesheet is applied so we can
    // confirm CSS-var interpolation worked, even on non-activation pages.
    function logSettingsOnce() {
      console.log("[yoDEV-activation-redirect] settings (from CSS vars):", readSettings());
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        logSettingsOnce();
        maybeHandleActivation();
      });
    } else {
      logSettingsOnce();
      maybeHandleActivation();
    }
  })();
</script>
