<script>
  (function () {
    // yoDEV Activation Redirect — plain-script variant.
    //
    // Uses ERB interpolation to bake theme settings into the script at render
    // time, so it works on both Ember-routed and server-rendered Discourse
    // pages (the activation success page can be either depending on Discourse
    // version, and plugin-API scripts only run on Ember pages).

    var HOMEPAGE_URL = "<%= setting('homepage_url') %>";
    var REDIRECT_DELAY_MS = parseInt("<%= setting('redirect_delay_ms') %>", 10) || 1500;
    var WATCH_TIMEOUT_MS = parseInt("<%= setting('watch_timeout_ms') %>", 10) || 10000;

    console.log("[yoDEV-activation-redirect] script loaded (plain-script variant)");
    console.log(
      "[yoDEV-activation-redirect] settings: homepage_url=" +
        (HOMEPAGE_URL || "(empty)") +
        " delay=" +
        REDIRECT_DELAY_MS +
        "ms watchTimeout=" +
        WATCH_TIMEOUT_MS +
        "ms"
    );

    function buildTargetUrl() {
      if (!HOMEPAGE_URL) return null;
      return HOMEPAGE_URL.replace(/\/+$/, "") + "/?activated=1";
    }

    function maybeHandleActivation() {
      var path = window.location.pathname || "";
      if (path.indexOf("/u/activate-account/") !== 0) return;
      console.log("[yoDEV-activation-redirect] activation page detected: " + path);

      var targetUrl = buildTargetUrl();
      if (!targetUrl) {
        console.warn(
          "[yoDEV-activation-redirect] homepage_url theme setting is empty; not redirecting"
        );
        return;
      }

      var elapsed = 0;
      var pollIntervalMs = 200;
      var intervalId = setInterval(function () {
        elapsed += pollIntervalMs;
        if (elapsed >= WATCH_TIMEOUT_MS) {
          console.warn(
            "[yoDEV-activation-redirect] gave up waiting for Finish button after " +
              WATCH_TIMEOUT_MS +
              "ms"
          );
          clearInterval(intervalId);
          return;
        }
        var btn = document.querySelector(
          "#welcome-button, .activate-account .btn-primary, .activate-account a.btn"
        );
        if (!btn) return;

        console.log(
          "[yoDEV-activation-redirect] Finish button found; scheduling redirect to " +
            targetUrl +
            " in " +
            REDIRECT_DELAY_MS +
            "ms"
        );
        clearInterval(intervalId);
        try {
          btn.setAttribute("href", targetUrl);
        } catch (e) {
          // Non-blocking
        }
        window.setTimeout(function () {
          window.location.href = targetUrl;
        }, REDIRECT_DELAY_MS);
      }, pollIntervalMs);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", maybeHandleActivation);
    } else {
      maybeHandleActivation();
    }
  })();
</script>
